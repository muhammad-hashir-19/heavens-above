name: Dependency Updates

on:
  schedule:
    - cron: "0 5 * * 1"   # Every Monday at 5 AM
  workflow_dispatch:

jobs:
  check-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for outdated dependencies
        run: |
          npm outdated || true
          echo "Dependency check completed."
