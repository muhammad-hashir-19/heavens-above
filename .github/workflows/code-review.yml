name: Code Review Workflow

on:
  pull_request:
    branches: [ "main" ]

jobs:
  code-review:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Lint code (coding standards)
        run: npm run lint

      - name: Run Jest tests
        run: npm test

      - name: Security scan
        run: npm audit --audit-level=moderate